<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");
let W, H;

function resize() {
  W = c.width  = window.innerWidth;
  H = c.height = window.innerHeight;
}

let t = 0;
function draw() {
  ctx.clearRect(0, 0, W, H);
  const cols = 18, rows = 18;
  const cellW = W / cols, cellH = H / rows;

  for (let r = 0; r <= rows; r++) {
    for (let col = 0; col <= cols; col++) {
      const x = col * cellW;
      const y = r * cellH;

      // Warp each grid point with sine waves
      const dx = Math.sin(r * 0.5 + t) * cellW * 0.3;
      const dy = Math.cos(col * 0.5 + t * 0.8) * cellH * 0.3;

      const nx = x + dx;
      const ny = y + dy;

      const alpha = 0.12 + 0.08 * Math.sin(col * 0.7 + r * 0.5 + t);
      ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
      ctx.lineWidth = 0.5;

      // Horizontal lines
      if (col < cols) {
        const nx2 = (col + 1) * cellW + Math.sin((r) * 0.5 + t) * cellW * 0.3;
        const ny2 = y + Math.cos((col + 1) * 0.5 + t * 0.8) * cellH * 0.3;
        ctx.beginPath();
        ctx.moveTo(nx, ny);
        ctx.lineTo(nx2, ny2);
        ctx.stroke();
      }
      // Vertical lines
      if (r < rows) {
        const nx2 = x + Math.sin((r + 1) * 0.5 + t) * cellW * 0.3;
        const ny2 = (r + 1) * cellH + Math.cos(col * 0.5 + t * 0.8) * cellH * 0.3;
        ctx.beginPath();
        ctx.moveTo(nx, ny);
        ctx.lineTo(nx2, ny2);
        ctx.stroke();
      }

      // Dot at each node
      const dotAlpha = 0.2 + 0.15 * Math.sin(col + r + t * 1.5);
      ctx.fillStyle = `rgba(255,255,255,${dotAlpha})`;
      ctx.beginPath();
      ctx.arc(nx, ny, 1, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  t += 0.008;
  requestAnimationFrame(draw);
}

window.addEventListener("resize", resize);
resize(); draw();
</script>
</body>
</html>
