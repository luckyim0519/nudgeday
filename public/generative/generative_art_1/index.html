<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById("c");
const ctx    = canvas.getContext("2d");
const skyBg  = document.createElement("canvas");
const skyCtx = skyBg.getContext("2d");
const stBg   = document.createElement("canvas");
const stCtx  = stBg.getContext("2d");

let W, H, mx = 0.5;

window.addEventListener("mousemove", e => { mx = e.clientX / window.innerWidth; });
window.addEventListener("touchmove", e => { mx = e.touches[0].clientX / window.innerWidth; }, { passive: true });

// Deterministic seeded RNG
function mkrng(seed) {
  let s = seed | 0;
  return () => { s = (Math.imul(s ^ (s >>> 16), 0x45d9f3b) | 0); return (s >>> 0) / 0xFFFFFFFF; };
}

// Monet dab — soft jittered ellipse
function dab(c, x, y, rx, ry, col, al, rng = Math.random) {
  c.save();
  c.globalAlpha = al;
  c.fillStyle   = col;
  c.translate(x + (rng()-0.5)*4, y + (rng()-0.5)*2);
  c.rotate((rng()-0.5)*0.45);
  c.beginPath();
  c.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
  c.fill();
  c.restore();
}

// ── Sky (painted once) ───────────────────────────────────────────────
function paintSky() {
  const hz = H * 0.56;

  // Gradient: deep purple → burnt orange → soft pink → peach
  const g = skyCtx.createLinearGradient(0, 0, 0, hz);
  g.addColorStop(0,    "#1e0638");
  g.addColorStop(0.18, "#6a1850");
  g.addColorStop(0.42, "#b03c1a");
  g.addColorStop(0.66, "#de6828");
  g.addColorStop(0.83, "#e89090");
  g.addColorStop(1,    "#f0b0a0");
  skyCtx.fillStyle = g;
  skyCtx.fillRect(0, 0, W, hz);

  // Impressionist sky texture
  const rng = mkrng(42);
  const pal = ["#7a2050","#c03848","#d05820","#e07838","#e898a8","#9a2860","#b03858","#d07840"];
  for (let i = 0; i < 900; i++) {
    dab(skyCtx, rng()*W, rng()*hz, 5+rng()*18, 2+rng()*5,
        pal[Math.floor(rng()*pal.length)], 0.02+rng()*0.035, rng);
  }

  // Sun glow near horizon left-center
  const sg = skyCtx.createRadialGradient(W*0.30, hz, 0, W*0.30, hz, Math.min(W,H)*0.28);
  sg.addColorStop(0,    "rgba(255,215,100,0.55)");
  sg.addColorStop(0.22, "rgba(255,140,50,0.28)");
  sg.addColorStop(0.55, "rgba(220,80,30,0.09)");
  sg.addColorStop(1,    "rgba(180,40,10,0)");
  skyCtx.fillStyle = sg;
  skyCtx.fillRect(0, 0, W, hz + 10);

  // Horizon haze strip
  const hg = skyCtx.createLinearGradient(0, hz-20, 0, hz+20);
  hg.addColorStop(0,   "rgba(230,145,75,0)");
  hg.addColorStop(0.5, "rgba(235,165,100,0.30)");
  hg.addColorStop(1,   "rgba(200,100,50,0)");
  skyCtx.fillStyle = hg;
  skyCtx.fillRect(0, hz-20, W, 40);

  // Sea base colour
  const seaG = skyCtx.createLinearGradient(0, hz, 0, H);
  seaG.addColorStop(0,    "#8a5080");
  seaG.addColorStop(0.12, "#3a5072");
  seaG.addColorStop(0.40, "#1a2848");
  seaG.addColorStop(0.75, "#0a1428");
  seaG.addColorStop(1,    "#05080f");
  skyCtx.fillStyle = seaG;
  skyCtx.fillRect(0, hz, W, H - hz);
}

// ── Cliff + Lighthouse (painted once) ────────────────────────────────
function paintStatic() {
  stCtx.clearRect(0, 0, W, H);
  const hz     = H * 0.56;
  const cliffX = W * 0.65;

  // Cliff mass
  stCtx.fillStyle = "#1e1208";
  stCtx.beginPath();
  stCtx.moveTo(cliffX - W*0.045, H);
  stCtx.lineTo(cliffX - W*0.045, hz + H*0.16);
  stCtx.bezierCurveTo(
    cliffX - W*0.01, hz + H*0.05,
    cliffX + W*0.04, hz - H*0.008,
    cliffX + W*0.09, hz - H*0.018);
  stCtx.lineTo(W, hz - H*0.018);
  stCtx.lineTo(W, H);
  stCtx.closePath();
  stCtx.fill();

  // Rock texture
  const rng   = mkrng(77);
  const rocks = ["#3a2010","#4a3020","#281808","#5a3828","#1e1008","#6a4030","#2e1810"];
  for (let i = 0; i < 450; i++) {
    dab(stCtx, cliffX - W*0.05 + rng()*W*0.45, hz - H*0.01 + rng()*(H-hz+H*0.02),
        3+rng()*12, 1.5+rng()*5, rocks[Math.floor(rng()*rocks.length)], 0.04+rng()*0.06, rng);
  }

  // Warm light on cliff top
  for (let i = 0; i < 90; i++) {
    dab(stCtx, cliffX + rng()*W*0.22, hz - H*0.01 + rng()*H*0.05,
        4+rng()*10, 2+rng()*4, "#cc6040", 0.03+rng()*0.05, rng);
  }

  // ── Lighthouse ──────────────────────────────────────────────────
  const lx    = W * 0.82;
  const lh    = H * 0.32;
  const baseY = hz - H * 0.024;
  const topY  = baseY - lh;
  const tw    = Math.max(5, W * 0.019);
  const lrng  = mkrng(99);

  // Red/white alternating stripes
  for (let s = 0; s < 6; s++) {
    const sy  = topY + (s/6) * lh;
    const ey  = topY + ((s+1)/6) * lh;
    const tw1 = tw * (1.35 - s*0.045);
    const tw2 = tw * (1.35 - (s+1)*0.045);

    stCtx.fillStyle = s % 2 === 0 ? "#c02515" : "#e8dece";
    stCtx.beginPath();
    stCtx.moveTo(lx-tw1, sy); stCtx.lineTo(lx+tw1, sy);
    stCtx.lineTo(lx+tw2, ey); stCtx.lineTo(lx-tw2, ey);
    stCtx.closePath(); stCtx.fill();

    // Right-side shadow
    stCtx.save(); stCtx.globalAlpha = 0.22; stCtx.fillStyle = "#000010";
    stCtx.beginPath();
    stCtx.moveTo(lx+tw1*0.25, sy); stCtx.lineTo(lx+tw1, sy);
    stCtx.lineTo(lx+tw2, ey); stCtx.lineTo(lx+tw2*0.25, ey);
    stCtx.closePath(); stCtx.fill(); stCtx.restore();

    // Monet stripe texture
    for (let d = 0; d < 7; d++) {
      dab(stCtx, lx+(lrng()-0.5)*tw1*1.8, sy+lrng()*(ey-sy),
          2+lrng()*4, 1+lrng()*2, s%2===0 ? "#991e10" : "#d0c8b0", 0.06+lrng()*0.09, lrng);
    }
  }

  // Lantern room — dark, no light
  const lrw = tw * 1.8, lrh = H * 0.042;
  stCtx.fillStyle = "#12121e";
  stCtx.fillRect(lx-lrw, topY-lrh, lrw*2, lrh);

  // Dome
  stCtx.fillStyle = "#0c0c18";
  stCtx.beginPath(); stCtx.arc(lx, topY-lrh, lrw*0.88, Math.PI, 0); stCtx.fill();

  // Spire
  stCtx.fillStyle = "#181828";
  stCtx.beginPath();
  stCtx.moveTo(lx-2, topY-lrh-lrw*0.88);
  stCtx.lineTo(lx+2, topY-lrh-lrw*0.88);
  stCtx.lineTo(lx, topY-lrh-lrw*0.88-H*0.03);
  stCtx.closePath(); stCtx.fill();

  // Gallery rail
  stCtx.fillStyle = "#252535";
  stCtx.fillRect(lx-lrw*1.3, topY, lrw*2.6, H*0.008);

  // Window
  stCtx.fillStyle = "#18142a";
  stCtx.beginPath(); stCtx.arc(lx, topY+lh*0.30, tw*0.28, 0, Math.PI*2); stCtx.fill();

  // Door
  const dw = tw*0.65, dh = lh*0.13;
  stCtx.fillStyle = "#180e08";
  stCtx.fillRect(lx-dw/2, baseY-dh, dw, dh);
  stCtx.beginPath(); stCtx.arc(lx, baseY-dh, dw/2, Math.PI, 0); stCtx.fill();
}

// ── Clouds (seeded = stable shape, position drifts) ──────────────────
const CLOUDS = [
  { bx:0.08, y:0.09, sx:1.1, seed:101, spd:0.06 },
  { bx:0.33, y:0.05, sx:1.4, seed:202, spd:0.04 },
  { bx:0.56, y:0.13, sx:0.9, seed:303, spd:0.08 },
  { bx:0.20, y:0.22, sx:0.70, seed:404, spd:0.05 },
  { bx:0.70, y:0.07, sx:0.6, seed:505, spd:0.07 },
];
const CCOLS = ["#f5c0d0","#f0a8b8","#e8c0d8","#d8a0b8","#f0d0e0","#e8b0c8","#f8d0d8"];

function drawClouds(t) {
  CLOUDS.forEach(({ bx, y, sx, seed, spd }) => {
    const cx  = bx*W + Math.sin(t*spd)*16;
    const cy  = y*H;
    const rng = mkrng(seed);
    for (let i = 0; i < 26; i++) {
      const ox = (rng()-0.5)*95*sx, oy = (rng()-0.5)*30*sx;
      const rx = 12+rng()*32*sx,    ry = 6+rng()*14*sx;
      dab(ctx, cx+ox, cy+oy, rx, ry, CCOLS[Math.floor(rng()*CCOLS.length)], 0.045+rng()*0.08, rng);
    }
  });
}

// ── Waves ────────────────────────────────────────────────────────────
const WAVES = [
  { spd:0.45, amp:0.042, wl:0.55, fill:"#607898", foam:"#b0c8dc" },
  { spd:0.72, amp:0.032, wl:0.40, fill:"#507090", foam:"#a8c0d8" },
  { spd:1.05, amp:0.025, wl:0.30, fill:"#406080", foam:"#c8dcea" },
  { spd:0.35, amp:0.050, wl:0.65, fill:"#304e68", foam:"#98b0c4" },
  { spd:1.55, amp:0.018, wl:0.24, fill:"#b8ccd8", foam:"#e8f2f8" },
];

function drawWaves(t) {
  const hz   = H * 0.56;
  const seaW = W * 0.70;
  const inf  = (mx - 0.5) * 0.65; // mouse influence on phase

  WAVES.forEach((wv, wi) => {
    const amp   = wv.amp * H;
    const wl    = wv.wl  * W;
    const yBase = hz + (H - hz) * (0.06 + wi * 0.17);

    // Filled wave path
    ctx.beginPath();
    ctx.moveTo(0, H);
    for (let x = 0; x <= seaW; x += 3) {
      const y = yBase
        + Math.sin((x/wl)*Math.PI*2 + t*wv.spd + inf*2.5) * amp
        + Math.sin((x/(wl*0.64))*Math.PI*2 - t*wv.spd*0.76) * amp*0.38
        + Math.sin((x/(wl*1.32))*Math.PI*2 + t*wv.spd*0.44) * amp*0.18;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(seaW, H); ctx.closePath();
    ctx.fillStyle   = wv.fill;
    ctx.globalAlpha = 0.14 + wi*0.02;
    ctx.fill();
    ctx.globalAlpha = 1;

    // White foam at crests
    for (let x = 0; x < seaW; x += 5) {
      const ph = (x/wl)*Math.PI*2 + t*wv.spd + inf*2.5;
      const c  = Math.sin(ph);
      if (c > 0.50) {
        const wy = yBase + c*amp*0.9;
        ctx.save();
        ctx.globalAlpha = c * 0.38 * (0.85 + Math.random()*0.3);
        ctx.fillStyle   = wv.foam;
        ctx.fillRect(x + (Math.random()-0.5)*5, wy-1.5, 4+Math.random()*10, 1.5);
        ctx.restore();
      }
    }
  });
}

// ── Splash particles (cliff face) ────────────────────────────────────
const splashes = [];

function spawnSplash(t) {
  const hz     = H * 0.56;
  const cliffX = W * 0.65;
  if (Math.sin(t * 1.55) > 0.80 && splashes.length < 80) {
    const y = hz + H*0.04 + Math.random()*H*0.13;
    const n = 18 + Math.floor(Math.random()*28);
    for (let i = 0; i < n; i++) {
      splashes.push({
        x: cliffX + (Math.random()-0.3)*18, y,
        vx: -(0.4 + Math.random()*4.2),
        vy: -(1.0 + Math.random()*7.0),
        life: 1.0, dec: 0.010+Math.random()*0.022,
        sz: 1.0+Math.random()*4.0,
        col: Math.random() > 0.3 ? "#d8eefa" : "#ffffff",
      });
    }
  }
}

function drawSplash() {
  for (let i = splashes.length-1; i >= 0; i--) {
    const p = splashes[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.13; p.vx *= 0.97; p.life -= p.dec;
    if (p.life <= 0) { splashes.splice(i,1); continue; }
    ctx.save();
    ctx.globalAlpha = p.life * 0.65;
    ctx.fillStyle   = p.col;
    ctx.beginPath();
    ctx.ellipse(p.x, p.y, p.sz*p.life, p.sz*p.life*0.42, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

// ── Main loop ────────────────────────────────────────────────────────
const t0 = Date.now();

function frame() {
  const t = (Date.now() - t0) / 1000;
  ctx.clearRect(0, 0, W, H);
  ctx.drawImage(skyBg, 0, 0);     // static sky + sea base
  drawClouds(t);                   // impressionist drifting clouds
  drawWaves(t);                    // animated ocean + foam
  ctx.drawImage(stBg, 0, 0);      // cliff + lighthouse (on top of sea)
  spawnSplash(t); drawSplash();    // spray hitting cliff
  requestAnimationFrame(frame);
}

function resize() {
  W = window.innerWidth;
  H = Math.floor(window.innerHeight * 0.5);
  [canvas, skyBg, stBg].forEach(c => { c.width = W; c.height = H; });
  paintSky();
  paintStatic();
}

window.addEventListener("resize", resize);
resize();
frame();
</script>
</body>
</html>
